# Duffing Oscillator System
name: duffing
_target_: src.simulators.systems.Duffing

state_dim: 2
output_dim: 1

# Observation configuration
observation:
  C: [1.0, 0.0]  # Output matrix
  observable_index: [0]

# System coefficients (defaults, can be overridden)
coefficients:
  alpha: 1.0
  beta: -1.0
  delta: 0.3
  gamma: 0.5
  omega: 1.2

# Initial condition sampling
ic_space: [[-1.0, 1.0], [-1.0, 1.0]]

# Noise configuration
noise:
  process:
    _target_: src.simulators.noise.GaussianNoise
    mean: 0.0
    std: 0.1
  measurement:
    _target_: src.simulators.noise.GaussianNoise
    mean: 0.0
    std: 0.1
