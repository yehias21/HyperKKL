# Main configuration - single source of truth for shared parameters
defaults:
  - _self_
  - system: duffing
  - observer: kkl_duffing
  - solver: rk4
  - sampler@system_sampler: lhs
  - sampler@observer_sampler: uniform
  - sampler@physics_sampler: lhs
  # Signal composition - override via CLI: signal@signals.0=lorenz
  - signal@signals.0: square
  - signal@signals.1: null  # Optional second signal
  - optional experiment: null

# ============== Global Parameters ==============
seed: 42
device: cuda

# ============== Simulation Parameters ==============
simulation:
  t0: 0.0
  tn: 50.0
  dt: 0.05
  num_trajectories: 50
  
# ============== Data Generation ==============
data:
  name: ${system.name}_dataset
  output_dir: outputs/datasets
  gen_mode: backward  # backward, forward, time_convergence
  pinn_sampling: split_traj  # split_traj, split_set, no_physics
  
  validation:
    enabled: true
    method: horizon  # horizon, different_config
    time: 10.0  # seconds for horizon method

# ============== DataLoader ==============
dataloader:
  batch_size: 32
  shuffle: true
  num_workers: 4
  pin_memory: true

# ============== Hydra Configuration ==============
hydra:
  run:
    dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: outputs/multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
